name: Build and deploy Container App

on:
  push:
    branches:
      - main

env:
  REGISTRY: ${{ secrets.ACR_LOGIN_SERVER }}
  IMAGE_NAME: techworkshop-l300-ai-apps-and-agents
  CONTAINER_APP_NAME: ${{ secrets.AZURE_CONTAINER_APP_NAME }}
  RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set image tag
        run: echo "IMAGE_TAG=${GITHUB_SHA}" >> "$GITHUB_ENV"

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v2
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        run: |
          docker build -f src/Dockerfile -t $REGISTRY/$IMAGE_NAME:$IMAGE_TAG src
          docker push $REGISTRY/$IMAGE_NAME:$IMAGE_TAG

      - name: Update Azure Container App
        uses: azure/CLI@v2
        with:
          inlineScript: |
            az containerapp update \
              --name "$CONTAINER_APP_NAME" \
              --resource-group "$RESOURCE_GROUP" \
              --image "$REGISTRY/$IMAGE_NAME:$IMAGE_TAG" \
              --set-env-vars \
                FOUNDRY_ENDPOINT="${{ secrets.FOUNDRY_ENDPOINT }}" \
                gpt_endpoint="${{ secrets.gpt_endpoint }}" \
                embedding_endpoint="${{ secrets.embedding_endpoint }}" \
                phi_4_endpoint="${{ secrets.phi_4_endpoint }}"
